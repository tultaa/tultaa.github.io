<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bikecity - Página Inicial</title>
  <link rel="stylesheet" href="/css/contato.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="/img/logo.png" alt="Bikecity Logo">
      <h1>Bikecity</h1>
    </div>
    <nav>
      <ul>
        <li><a href="/paginas/inicial.html">Inicial</a></li>
        <li><a href="/paginas/sobre.html">Sobre</a></li>
        <li><a href="/paginas/contato.html">Contato</a></li>
        <li><a href="/paginas/login.html">Login</a></li>
        <li><a href="/paginas/quiz.html">Quiz</a></li>
      </ul>
    </nav>
  </header>

  <section id="contact">
    <h2></h2>
    <form onsubmit="return validateContactForm()">
      <label for="name">Nome:</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">Telefone:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <button type="submit">Enviar</button>
    </form>
  </section>
  

  <footer>
    <p>© 2024 Bikecity. Todos os direitos reservados.</p>
  </footer>

  <script src="/js/script.js"></script>
</body>
</html>
